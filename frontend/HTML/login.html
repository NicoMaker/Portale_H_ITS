<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Login — Portale ITS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0f0e17;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Animated gradient background */
      .bg-scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(
          135deg,
          #0f0e17 0%,
          #1a1040 40%,
          #0d1b3e 100%
        );
      }
      .bg-scene::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        top: -150px;
        left: -150px;
        background: radial-gradient(
          circle,
          rgba(79, 70, 229, 0.35) 0%,
          transparent 70%
        );
        animation: drift1 12s ease-in-out infinite;
        border-radius: 50%;
      }
      .bg-scene::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        bottom: -100px;
        right: -100px;
        background: radial-gradient(
          circle,
          rgba(124, 58, 237, 0.3) 0%,
          transparent 70%
        );
        animation: drift2 15s ease-in-out infinite;
        border-radius: 50%;
      }
      .blob-mid {
        position: absolute;
        width: 400px;
        height: 400px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.12) 0%,
          transparent 70%
        );
        animation: drift3 10s ease-in-out infinite;
        border-radius: 50%;
        pointer-events: none;
      }

      @keyframes drift1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(60px, 40px) scale(1.1);
        }
      }
      @keyframes drift2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-50px, -30px) scale(1.15);
        }
      }
      @keyframes drift3 {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-48%, -52%) scale(1.08);
        }
      }

      /* Grid lines */
      .grid-lines {
        position: fixed;
        inset: 0;
        z-index: 1;
        background-image:
          linear-gradient(rgba(79, 70, 229, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(79, 70, 229, 0.06) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* Floating particles */
      .particle {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
        animation: floatUp linear infinite;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100px) scale(1);
          opacity: 0;
        }
      }

      /* Card */
      .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        margin: 1rem;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow:
          0 25px 60px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 0 0 1px rgba(79, 70, 229, 0.15);
        animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(40px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Logo area */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
      }
      .logo-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 8px 32px rgba(79, 70, 229, 0.5),
          0 0 0 4px rgba(79, 70, 229, 0.15);
        margin-bottom: 1rem;
        animation: pulse-glow 3s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow:
            0 8px 32px rgba(79, 70, 229, 0.5),
            0 0 0 4px rgba(79, 70, 229, 0.15);
        }
        50% {
          box-shadow:
            0 8px 48px rgba(79, 70, 229, 0.7),
            0 0 0 8px rgba(79, 70, 229, 0.1);
        }
      }
      .logo-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .logo-sub {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 0.25rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* Form elements */
      .field-group {
        margin-bottom: 1.25rem;
      }
      .field-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.5rem;
      }
      .field-wrap {
        position: relative;
      }
      .field-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.3);
        pointer-events: none;
        transition: color 0.2s;
      }
      .field-input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        background: rgba(255, 255, 255, 0.07);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 400;
        outline: none;
        transition: all 0.2s;
        -webkit-appearance: none;
      }
      .field-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }
      .field-input:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(79, 70, 229, 0.7);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      }
      .field-input:focus + .field-icon-right,
      .field-wrap:focus-within .field-icon {
        color: rgba(79, 70, 229, 0.9);
      }

      .toggle-pw {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.3);
        padding: 4px;
        transition: color 0.2s;
      }
      .toggle-pw:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      /* Submit button */
      .btn-submit {
        width: 100%;
        padding: 0.9375rem;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s;
        margin-top: 0.5rem;
        letter-spacing: 0.01em;
        position: relative;
        overflow: hidden;
      }
      .btn-submit::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.2s;
      }
      .btn-submit:hover::before {
        opacity: 1;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(79, 70, 229, 0.5);
      }
      .btn-submit:active {
        transform: translateY(0);
      }
      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .btn-submit .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2.5px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Error message */
      .msg-error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.8125rem;
        font-weight: 500;
        text-align: center;
        margin-top: 0.75rem;
        display: none;
      }
      .msg-error.show {
        display: block;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Footer link */
      .footer-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.3);
        text-decoration: none;
        transition: color 0.2s;
      }
      .footer-link:hover {
        color: rgba(255, 255, 255, 0.6);
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.5rem 0;
        color: rgba(255, 255, 255, 0.2);
        font-size: 0.75rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <!-- Background -->
    <div class="bg-scene"></div>
    <div class="blob-mid"></div>
    <div class="grid-lines"></div>

    <!-- Particles (JS generated) -->

    <!-- Login Card -->
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg
            width="32"
            height="32"
            fill="none"
            stroke="#fff"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h1a1 1 0 011 1v5m-4 0h4"
            />
          </svg>
        </div>
        <h1 class="logo-title">Portale ITS</h1>
        <p class="logo-sub">Sistema di Gestione</p>
      </div>

      <!-- Form -->
      <form id="login-form">
        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <div class="field-wrap">
            <svg
              class="field-icon"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              />
            </svg>
            <input
              class="field-input"
              type="text"
              id="username"
              name="username"
              placeholder="Inserisci username"
              required
              autocomplete="off"
            />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <svg
              class="field-icon"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              />
            </svg>
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="Inserisci password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              class="toggle-pw"
              id="toggle-pw"
              title="Mostra/nascondi password"
            >
              <svg
                id="eye-icon"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span id="btn-text">Accedi</span>
          <div class="spinner" id="btn-spinner"></div>
        </button>

        <div class="msg-error" id="login-msg"></div>
      </form>

      <a
        href="mailto:admin@example.com?subject=Recupero%20Password"
        class="footer-link"
      >
        Hai dimenticato la password? Contatta l'amministratore
      </a>
    </div>

    <script>
      // Particles
      (function () {
        const colors = [
          "rgba(79,70,229,0.6)",
          "rgba(124,58,237,0.5)",
          "rgba(6,182,212,0.4)",
          "rgba(139,92,246,0.5)",
        ];
        for (let i = 0; i < 18; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 4 + 2;
          p.style.cssText = `
            width:${size}px;height:${size}px;
            left:${Math.random() * 100}%;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            animation-duration:${Math.random() * 15 + 10}s;
            animation-delay:${Math.random() * 10}s;
          `;
          document.body.appendChild(p);
        }
      })();

      // Toggle password
      document
        .getElementById("toggle-pw")
        .addEventListener("click", function () {
          const pw = document.getElementById("password");
          const icon = document.getElementById("eye-icon");
          if (pw.type === "password") {
            pw.type = "text";
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>`;
          } else {
            pw.type = "password";
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
          }
        });

      // Clear fields on load
      window.addEventListener("pageshow", (e) => {
        if (e.persisted) document.getElementById("login-form").reset();
      });
      setTimeout(() => {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      }, 0);

      // Form submit
      document.getElementById("login-form").onsubmit = function (e) {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const msgEl = document.getElementById("login-msg");
        const btn = document.getElementById("submit-btn");
        const btnText = document.getElementById("btn-text");
        const spinner = document.getElementById("btn-spinner");

        // Loading state
        btn.disabled = true;
        btnText.style.display = "none";
        spinner.style.display = "block";
        msgEl.classList.remove("show");

        const data = `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
        fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: data,
        })
          .then((r) => r.text())
          .then((msg) => {
            if (msg.includes("dashboard")) {
              window.location = msg.includes("admin_dashboard")
                ? "/admin_dashboard.html"
                : "/user_dashboard.html";
            } else {
              const errorText = msg.includes("Credenziali non valide")
                ? "❌ Credenziali non valide. Riprova."
                : msg || "❌ Errore durante il login.";
              msgEl.textContent = errorText;
              msgEl.classList.add("show");
              btn.disabled = false;
              btnText.style.display = "";
              spinner.style.display = "none";
              // Shake animation
              document.querySelector(".login-card").style.animation = "none";
              document.querySelector(".login-card").offsetHeight;
              document.querySelector(".login-card").style.animation =
                "shake 0.4s ease";
            }
          })
          .catch(() => {
            msgEl.textContent = "⚠️ Errore di rete. Controlla la connessione.";
            msgEl.classList.add("show");
            btn.disabled = false;
            btnText.style.display = "";
            spinner.style.display = "none";
          });
      };
    </script>
    <style>
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-5px);
        }
        80% {
          transform: translateX(5px);
        }
      }
    </style>
  </body>
</html>
