<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 Login - Portale ITS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.js"></script>
  <link rel="stylesheet" href="CSS/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-container {
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="login-container w-full max-w-md">
    <!-- Logo Section -->
    <div class="text-center mb-8 animate-slide-up">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl glass-effect mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">Portale ITS</h1>
      <p class="text-blue-100">Gestione Corsi e Orari</p>
    </div>

    <!-- Login Card -->
    <div class="glass-effect rounded-3xl p-8 shadow-2xl animation-delay-200 card-hover">
      <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Accedi al tuo account</h2>
      
      <form id="login-form" method="POST" action="/login" class="space-y-5">
        <!-- Username -->
        <div class="space-y-2">
          <label for="username" class="block text-sm font-semibold text-gray-700">
            👤 Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Inserisci il tuo username"
            required
            autocomplete="username"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 bg-white/90 transition-all duration-200 placeholder-gray-400"
          />
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label for="password" class="block text-sm font-semibold text-gray-700">
            🔒 Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Inserisci la tua password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 bg-white/90 transition-all duration-200 placeholder-gray-400"
          />
        </div>

        <!-- Error Message -->
        <div id="login-msg" class="text-center text-red-500 font-medium hidden"></div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200"
        >
          🚀 Accedi
        </button>
      </form>

      <!-- Help Link -->
      <div class="text-center mt-6 pt-6 border-t border-gray-200/50">
        <a href="mailto:admin@example.com?subject=Recupero%20Password" class="text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
          ❓ Hai dimenticato la password?
        </a>
      </div>
    </div>

    <!-- Footer Info -->
    <div class="text-center mt-8 text-blue-50 text-sm">
      <p>Accedi con le tue credenziali</p>
      <p class="mt-2 text-xs opacity-75">Admin demo: <strong>Admin / Admin123!</strong></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
